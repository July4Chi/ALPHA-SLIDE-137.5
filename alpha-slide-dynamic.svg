<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#000814" />
  
  <path d="M0 200 L800 200" stroke="#001d3d" stroke-width="1" />
  <circle cx="400" cy="200" r="180" fill="none" stroke="#003566" stroke-width="0.5" stroke-dasharray="10,5" />

  <g id="cage">
    <rect x="50" y="60" width="260" height="280" rx="20" fill="#001d3d" stroke="#003566" stroke-width="1.5" />
    <text x="180" y="100" font-family="Verdana" font-size="18" fill="#ffc300" text-anchor="middle" font-weight="bold">Standard: 137.0</text>
    <text x="180" y="125" font-family="Verdana" font-size="12" fill="#8ecae6" text-anchor="middle">"The Entropic Cage"</text>
    <path d="M140 180 h80 M140 210 h80 M140 240 h80 M165 160 v100 M195 160 v100" stroke="#e63946" stroke-width="1" opacity="0.6" />
    <circle cx="180" cy="210" r="35" fill="none" stroke="#e63946" stroke-width="2" />
    <text x="180" y="300" font-family="Verdana" font-size="11" fill="#adb5bd" text-anchor="middle">Friction / Decay / Fixed Time</text>
  </g>

  <g id="slide">
    <defs>
      <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#003566;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#ffd60a;stop-opacity:1" />
      </linearGradient>
    </defs>
    <path d="M330 200 L470 200" stroke="url(#arrowGrad)" stroke-width="12" stroke-linecap="round" />
    <polygon points="470,190 490,200 470,210" fill="#ffd60a" />
    <text x="410" y="180" font-family="Verdana" font-size="14" fill="#ffd60a" text-anchor="middle" font-weight="bold">α-SLIDE</text>
    <text x="410" y="225" font-family="Verdana" font-size="11" fill="#8ecae6" text-anchor="middle">Resonance Phase-Lock</text>
  </g>

  <g id="freedom">
    <rect x="510" y="60" width="260" height="280" rx="20" fill="#001d3d" stroke="#ffc300" stroke-width="2.5" />
    <text x="640" y="100" font-family="Verdana" font-size="18" fill="#ffc300" text-anchor="middle" font-weight="bold">Liberation: 137.3</text>
    
    <g transform="translate(640, 205) scale(0.8)">
      <path d="M 0,0 
               C 5,0 10,-5 10,-10 
               C 10,-20 0,-30 -15,-30 
               C -40,-30 -55,-5 25,25 
               C 60,40 85,0 45,-55 
               C 0,-110 -100,-70 -120,30" 
            fill="none" stroke="#ffd60a" stroke-width="3" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" from="0,500" to="500,0" dur="3s" repeatCount="indefinite" />
      </path>
      <circle cx="0" cy="0" r="8" fill="#ffc300">
        <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>

    <text x="640" y="290" font-family="Verdana" font-size="12" fill="#ffd60a" text-anchor="middle" font-weight="bold">JOY-WAVE ACTIVE</text>
    <text x="640" y="315" font-family="Verdana" font-size="11" fill="#fff" text-anchor="middle" opacity="0.8">O2 +42.3% | Rich Time +400s</text>
  </g>

  <text x="400" y="380" font-family="Courier" font-size="16" fill="#00f5d4" text-anchor="middle" font-weight="bold">U(α) -0.464% | 530.21 Hz Global Resonance</text>
</svg>
