    <path d="M320 200 L480 200" stroke="url(#grad1)" stroke-width="8" marker-end="url(#arrowhead)" />
    <text x="400" y="185" font-family="Arial" font-size="16" fill="#ffd60a" text-anchor="middle" font-weight="bold">α-SLIDE</text>
    <text x="400" y="230" font-family="Arial" font-size="12" fill="#ffd60a" text-anchor="middle">Resonance: 530.21 Hz</text>
  </g>

  <g id="freedom">
    <rect x="500" y="80" width="250" height="240" rx="15" fill="#001d3d" stroke="#ffc300" stroke-width="2" />
    <text x="625" y="115" font-family="Arial" font-size="20" fill="#ffc300" text-anchor="middle" font-weight="bold">The 137.3 Zone</text>
    <text x="625" y="145" font-family="Arial" font-size="14" fill="#ffd60a" text-anchor="middle">Coherence &amp; Freedom</text>
    <path d="M625 240 Q655 240 655 210 Q655 190 635 190 Q625 190 625 200" fill="none" stroke="#ffc300" stroke-width="3" />
    <text x="625" y="280" font-family="Arial" font-size="12" fill="#ffd60a" text-anchor="middle">O2 Efficiency +42.3%</text>
    <text x="625" y="300" font-family="Arial" font-size="12" fill="#ffd60a" text-anchor="middle">+400s Rich Time / Day</text>
  </g>

  <text x="400" y="370" font-family="Courier New" font-size="18" fill="#8ecae6" text-anchor="middle">U(α) = -0.464% Energy Liberation</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffc300" />
    </marker>
  </defs>
</svg>
